name: Test Semver Compare

on:
  push:
    branches: ['fix/semver-compare']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-slim
    steps:
      - name: Test semver comparison logic
        run: |
          compare() {
            local STABLE_VERSION="$1"
            local ALPHA_VERSION="$2"
            local EXPECTED="$3"

            RESULT=$(python3 -c "
          import re
          def key(v):
              v = v.lstrip('v')
              m = re.match(r'(\d+)\.(\d+)\.(\d+)(?:-(.*))?' , v)
              base = (int(m.group(1)), int(m.group(2)), int(m.group(3)))
              pre = m.group(4)
              return (base, (1,)) if pre is None else (base, (0, pre))
          vs = ['$STABLE_VERSION', '$ALPHA_VERSION']
          print(max(vs, key=key))
          ")

            if [ "$RESULT" == "$EXPECTED" ]; then
              echo "PASS: stable=$1 alpha=$2 -> $RESULT (expected $EXPECTED)"
            else
              echo "FAIL: stable=$1 alpha=$2 -> $RESULT (expected $EXPECTED)"
              exit 1
            fi
          }

          echo "=== Semver comparison tests ==="
          echo ""

          # Normal cases: different base versions
          compare "v5.4.0" "v5.3.0-beta01" "v5.4.0"
          compare "v5.4.0" "v5.5.0-beta01" "v5.5.0-beta01"
          compare "v5.3.2" "v5.4.0-beta05" "v5.4.0-beta05"

          # Edge cases: same base version (the bug scenario)
          compare "v5.4.0" "v5.4.0-beta05" "v5.4.0"
          compare "v5.4.0" "v5.4.0-alpha01" "v5.4.0"
          compare "v6.0.0" "v6.0.0-rc1" "v6.0.0"

          # Same version
          compare "v5.4.0" "v5.4.0" "v5.4.0"

          echo ""
          echo "=== All 7 tests passed ==="
